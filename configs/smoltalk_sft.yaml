  split: train
  output_dir: data/processed/smoltalk
  tokenizer: gpt2
  prompt_template: "<user>{prompt}<assistant>"
  max_samples: null
hub:
  repo_id: argo11/hiro-llm-smoltalk
wandb:
  enabled: true
  project: hiro-llm
  run_name: smoltalk-sft
