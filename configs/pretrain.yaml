task: pretrain
model:
  vocab_size: 50257
  max_sequence_length: 256
  embedding_dim: 384
  hidden_dim: 1536
  num_attention_heads: 6
  num_layers: 6
  num_relative_positions: 256
  dropout: 0.0
training:
  batch_size: 8
  total_steps: 10000
  checkpoint_every: 1000
  log_every: 10
  max_learning_rate: 0.0003
  min_learning_rate: 0.00003
  warmup_steps: 500
  weight_decay: 0.1
  gradient_clip_norm: 1.0
  seed: 42
  amp: true
  compile_model: true
data:
  kind: text
  source_type: local
  source: data/raw/sample_text.txt
  output_dir: data/processed/pretrain
  tokenizer: gpt2
vision: {}
hub:
  repo_id: argo11/hiro-llm-pretrain
  private: false
  token_env: HF_TOKEN
runtime:
  device: auto
  num_workers: 0
