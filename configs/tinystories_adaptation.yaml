task: pretrain
model:
  vocab_size: 50257
  max_sequence_length: 256
  embedding_dim: 256
  hidden_dim: 1024
  num_attention_heads: 8
  num_layers: 6
  num_relative_positions: 256
training:
  batch_size: 16
  total_steps: 10000
  checkpoint_every: 1000
  log_every: 50
  init_from: hf://argo11/hiro-llm-shakespeare/checkpoint-00010000.pt
  amp: true
data:
  kind: text
  source_type: huggingface
  source: roneneldan/TinyStories
  split: train
  output_dir: data/processed/tinystories
  tokenizer: gpt2
  prompt_field: text
  validation_fraction: 0.1
hub:
  repo_id: argo11/hiro-llm-tinystories
wandb:
  enabled: true
  project: hiro-llm
  run_name: tinystories-adaptation
