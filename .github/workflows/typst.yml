name: Typst

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: typst-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile document
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Build the writing environment
        run: docker build --file .devcontainer/Dockerfile --tag hiro-llm-devcontainer .

      - name: Compile the Typst document
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp \
            --volume "${PWD}:/workspace" \
            --workdir /workspace \
            hiro-llm-devcontainer \
            make typst-check

      - name: Upload PDF
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: typst-document
          path: build/main.pdf
          if-no-files-found: error
