name: Discord notifications

on:
  push:
    branches:
      - main
  pull_request_target: # zizmor: ignore[dangerous-triggers] checks out trusted main only
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
      - closed
  release:
    types:
      - published
  workflow_run: # zizmor: ignore[dangerous-triggers] reads metadata only
    workflows:
      - Python CI
      - Typst
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: discord-notifications
  cancel-in-progress: false

jobs:
  notify:
    name: Send Discord notification
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out trusted notification code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: refs/heads/main
          fetch-depth: 1
          persist-credentials: false

      - name: Send notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python .github/scripts/discord_notify.py
